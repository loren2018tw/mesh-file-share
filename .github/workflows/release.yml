name: Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: --bundles deb
          - platform: windows-latest
            args: --bundles nsis
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Node.js setup
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: get date
        id: date
        shell: bash
        run: |
          echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "VERSION=$(date +'%y.%-m.%-d')" >> $GITHUB_OUTPUT

      - name: set version and asset pattern
        shell: bash
        run: |
          DATE=${{ steps.date.outputs.DATE }}
          VERSION=${{ steps.date.outputs.VERSION }}
          # Update version
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" src-tauri/tauri.conf.json

          echo "ASSET_PATTERN=mesh-file-share_${DATE}_[arch][ext]" >> $GITHUB_ENV

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ steps.date.outputs.DATE }}
          releaseName: "Release v${{ steps.date.outputs.DATE }}"
          releaseDraft: true
          prerelease: false
          assetNamePattern: ${{ env.ASSET_PATTERN }}
          args: ${{ matrix.args }}

      - name: Create portable archive (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          DATE=${{ steps.date.outputs.DATE }}
          cd src-tauri/target/release
          tar -czf "mesh-file-share_${DATE}_amd64-portable.tar.gz" mesh-file-share

      - name: Create portable archive (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          DATE=${{ steps.date.outputs.DATE }}
          cd src-tauri/target/release
          7z a "mesh-file-share_${DATE}_x64-portable.zip" mesh-file-share.exe

      - name: Upload portable archive
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.date.outputs.DATE }}
          draft: true
          files: |
            src-tauri/target/release/mesh-file-share_*-portable.*
